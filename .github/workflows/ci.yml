name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # T-243: end-to-end regression (MCP tools + Playwright UI). Optional - it
  # depends on public network endpoints (httpbin.org, grpcb.in, ...), so it
  # never blocks a merge, but it must be green before T-227 begins.
  e2e:
    name: E2E regression (optional)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build server and UI
        run: npm run build

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: MCP tool regression
        run: npm run test:e2e:mcp

      - name: Playwright UI regression
        run: npm run test:e2e:ui
