syntax = "proto3";

// Standard gRPC helloworld service - for local testing on localhost:50051
// Run locally with: docker run --rm -p 50051:50051 grpc/java-example-hostname
package helloworld;

service Greeter {
  // Unary RPC
  rpc SayHello(HelloRequest) returns (HelloReply);

  // Server streaming RPC
  rpc SayHelloStream(HelloRequest) returns (stream HelloReply);
}

message HelloRequest {
  string name = 1;
}

message HelloReply {
  string message = 1;
}
