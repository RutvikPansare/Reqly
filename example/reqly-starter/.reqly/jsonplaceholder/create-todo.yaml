name: create-todo
method: POST
url: '{{baseUrl}}/todos'
headers:
  Content-Type: application/json
body: |
  {
    "title": "Learn Reqly",
    "completed": false,
    "userId": 1
  }
assertions:
  - field: status
    operator: eq
    value: 201
postScript: |
  const id = response.body.id;
  env.lastTodoId = String(id);
